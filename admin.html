<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin - Demandes de messe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: white;
            flex: 1;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #2a5298;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .filters {
            background: white;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filters input, .filters select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            flex: 1;
            min-width: 150px;
        }
        
        .refresh-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .table-container {
            background: white;
            border-radius: 16px;
            overflow-x: auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th {
            background: #2a5298;
            color: white;
            padding: 12px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .status-pending {
            background: #ff4757;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
        }
        
        .status-done {
            background: #2ed573;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            th, td {
                font-size: 11px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Demandes de messe</h1>
        <p>Liste des intentions reçues</p>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-number" id="totalCount">-</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-number" id="pendingCount">-</div><div class="stat-label">En attente</div></div>
        <div class="stat-card"><div class="stat-number" id="todayCount">-</div><div class="stat-label">Aujourd'hui</div></div>
    </div>
    
    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher un nom...">
        <button class="refresh-btn" onclick="chargerDepuisAPI()">🔄 Actualiser</button>
    </div>
    
    <div class="table-container" id="tableContainer">
        <div class="loading">⏳ Chargement des demandes...</div>
    </div>
    
    <div class="footer">
        📊 Les données sont automatiquement synchronisées avec Google Sheets
    </div>
    
    <script>
        // Ton ID de feuille Google Sheets
        const SHEET_ID = '1fTpQ18Rc_15b57fIPZc2Zuam7AvO23_YjS3PcheludQ';
        
        async function chargerDepuisAPI() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<div class="loading">⏳ Chargement...</div>';
            
            try {
                // Utiliser Google Sheets CSV export (pas besoin de clé API !)
                const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
                
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                // Convertir CSV en tableau
                const lignes = csvText.split('\n');
                const entetes = lignes[0].split(',');
                
                const demandes = [];
                for (let i = 1; i < lignes.length; i++) {
                    if (lignes[i].trim() === '') continue;
                    const valeurs = lignes[i].split(',');
                    const demande = {};
                    for (let j = 0; j < entetes.length; j++) {
                        demande[entetes[j].trim()] = valeurs[j] ? valeurs[j].trim() : '';
                    }
                    demandes.push(demande);
                }
                
                afficherTableau(demandes);
                mettreAJourStats(demandes);
                
            } catch (error) {
                console.error('Erreur:', error);
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center;">
                        <p style="color: #dc3545;">❌ Impossible de charger les données</p>
                        <p style="margin-top: 10px;">Vérifiez que votre feuille est publiée :</p>
                        <p style="margin-top: 10px;">Fichier → Partager → Publier sur le web</p>
                        <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" style="display: inline-block; margin-top: 20px; background: #2a5298; color: white; padding: 10px 20px; text-decoration: none; border-radius: 10px;">
                            📊 Ouvrir Google Sheets
                        </a>
                    </div>
                `;
            }
        }
        
        function afficherTableau(demandes) {
            const container = document.getElementById('tableContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtrees = demandes;
            if (searchTerm) {
                filtrees = demandes.filter(d => 
                    d.Nom && d.Nom.toLowerCase().includes(searchTerm)
                );
            }
            
            if (filtrees.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: #999;">📭 Aucune demande trouvée</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Nom</th>
                            <th>Date messe</th>
                            <th>Horaire</th>
                            <th>Intention</th>
                            <th>Téléphone</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            for (const d of filtrees) {
                html += `
                    <tr>
                        <td>${d.Horodatage || '-'}</td>
                        <td><strong>${d.Nom || '-'}</strong></td>
                        <td>${d.Date || '-'}</td>
                        <td>${d.Horaire || '-'}</td>
                        <td style="max-width: 250px;">${(d.Intention || '-').substring(0, 80)}</td>
                        <td>${d.Téléphone || '-'}</td>
                    </tr>
                `;
            }
            
            html += `</tbody></table>`;
            container.innerHTML = html;
        }
        
        function mettreAJourStats(demandes) {
            document.getElementById('totalCount').textContent = demandes.length;
            
            const aujourdHui = new Date().toLocaleDateString('fr-FR');
            const aujourdHuiCount = demandes.filter(d => {
                const dateDemande = d.Horodatage ? d.Horodatage.split(' ')[0] : '';
                return dateDemande === aujourdHui;
            }).length;
            document.getElementById('todayCount').textContent = aujourdHuiCount;
            
            const pendingCount = demandes.length;
            document.getElementById('pendingCount').textContent = pendingCount;
        }
        
        // Recherche en temps réel
        document.getElementById('searchInput').addEventListener('input', () => chargerDepuisAPI());
        
        // Chargement initial
        chargerDepuisAPI();
        
        // Actualisation toutes les 30 secondes
        setInterval(chargerDepuisAPI, 30000);
    </script>
</body>
</html>
