<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin - Demandes de messe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 24px 20px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: white;
            flex: 1;
            min-width: 120px;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #2a5298;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .filters {
            background: white;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .filters input, .filters select {
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            flex: 1;
            min-width: 150px;
            font-size: 14px;
        }
        
        .table-container {
            background: white;
            border-radius: 16px;
            overflow-x: auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th {
            background: #2a5298;
            color: white;
            padding: 14px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 12px 14px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-pending {
            background: #ff4757;
            color: white;
        }
        
        .status-done {
            background: #2ed573;
            color: white;
        }
        
        .refresh-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            
            th, td {
                font-size: 12px;
                padding: 8px;
            }
            
            .stat-number {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Administration des messes</h1>
        <p>Consultez et gérez les intentions de messe</p>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-number" id="totalCount">-</div><div class="stat-label">Total demandes</div></div>
        <div class="stat-card"><div class="stat-number" id="pendingCount">-</div><div class="stat-label">En attente</div></div>
        <div class="stat-card"><div class="stat-number" id="todayCount">-</div><div class="stat-label">Aujourd'hui</div></div>
    </div>
    
    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher par nom...">
        <select id="statusFilter">
            <option value="all">Tous les statuts</option>
            <option value="Non traitée">Non traitées</option>
            <option value="Traité">Traitées</option>
        </select>
        <button class="refresh-btn" onclick="chargerDemandes()">🔄 Actualiser</button>
    </div>
    
    <div class="table-container" id="tableContainer">
        <div class="loading">⏳ Chargement des demandes...</div>
    </div>
    
    <div class="footer">
        Mise à jour automatique toutes les 30 secondes
    </div>
    
    <script>
        // ⚠️ IMPORTANT : Remplace par l'ID de ta feuille
        const SHEET_ID = '1fTpQ18Rc_15b57fIPZc2Zuam7AvO23_YjS3PcheludQ';
        
        let toutesLesDemandes = [];
        
        async function chargerDemandes() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<div class="loading">⏳ Chargement...</div>';
            
            try {
                // Utilisation de l'API Google Sheets en lecture seule
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Feuille%201?key=API_KEY_ICI`;
                // Note: Google Sheets API nécessite une clé API
                // Solution alternative plus simple ci-dessous
                
                // Solution sans API : utiliser un service tiers ou CSV
                chargerDepuisCSV();
                
            } catch (error) {
                console.error('Erreur:', error);
                container.innerHTML = '<div class="error">❌ Erreur de chargement. Utilisez les boutons ci-dessous pour accéder directement au tableau.</div>';
            }
        }
        
        // Solution alternative : lien direct vers Google Sheets
        function chargerDepuisCSV() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = `
                <div style="padding: 40px; text-align: center;">
                    <p style="margin-bottom: 20px;">📊 Pour voir toutes les demandes, cliquez sur le bouton ci-dessous :</p>
                    <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" style="display: inline-block; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 14px 28px; text-decoration: none; border-radius: 12px; font-weight: bold;">
                        📊 Ouvrir Google Sheets
                    </a>
                    <p style="margin-top: 20px; font-size: 12px; color: #666;">Toutes les demandes sont accessibles dans votre feuille Google Sheets.</p>
                </div>
            `;
        }
        
        function afficherDemandes() {
            // Cette fonction serait utilisée avec l'API
        }
        
        // Chargement initial
        chargerDemandes();
        
        // Rafraîchissement toutes les 30 secondes
        setInterval(chargerDemandes, 30000);
    </script>
</body>
</html>
