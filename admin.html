<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Demandes de messe</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #667eea;
            color: white;
        }
        
        .badge {
            background: #4CAF50;
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
        }
        
        input {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Administration - Demandes de messe</h1>
        <p>Gérez les intentions reçues</p>
    </div>
    
    <div class="card">
        <h2>📊 Statistiques</h2>
        <p>Total des demandes : <strong id="totalCount">0</strong></p>
        <input type="text" id="search" placeholder="🔍 Rechercher par nom...">
    </div>
    
    <div class="card">
        <div id="demandes"></div>
    </div>
    
    <script>
        // Pour afficher les données, il faudrait une autre fonction Google Sheets
        // Méthode plus simple : partager la feuille Google Sheets en lecture seule
        // et l'intégrer ici
        
        // Option simple : intègre directement ta feuille Google Sheets
        const sheetUrl = 'https://script.google.com/macros/s/AKfycbz0WCIERXHPzoSW3NdChenKEWQEfqPiWmrDtzSrkI71Hq9PicWpILhHrvckFEeoFTik/exec';
        
        // Ou utilise Google Sheets API si tu veux plus de contrôle
        // Version simplifiée pour l'instant : affiche un lien
        document.getElementById('demandes').innerHTML = `
            <p>🔐 Accès admin :</p>
            <a href="${sheetUrl}" target="_blank" style="display: inline-block; background: #667eea; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px;">
                📊 Ouvrir le tableau des demandes
            </a>
            <p style="margin-top: 20px; color: #666;">Vous pouvez aussi :</p>
            <ul>
                <li>✅ Marquer les demandes comme traitées</li>
                <li>📧 Contacter les fidèles par téléphone</li>
                <li>📅 Planifier les messes</li>
            </ul>
        `;
    </script>
</body>
</html>
