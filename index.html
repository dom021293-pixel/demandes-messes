<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Demande de Messe - Paroisse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .category-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .cat-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .cat-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .price {
            background: #f0f2f5;
            padding: 12px;
            border-radius: 12px;
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2a5298;
            margin: 10px 0;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: scale(1.02);
        }
        
        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
            border-left: 4px solid #28a745;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border-left: 4px solid #dc3545;
        }
        
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
            border-left: 4px solid #17a2b8;
        }
        
        .ticket {
            background: #fff9e6;
            border: 2px dashed #ffc107;
            border-radius: 16px;
            padding: 16px;
            margin: 15px 0;
            font-size: 12px;
        }
        
        .payment-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        
        .payment-btn {
            flex: 1;
            background: white;
            border: 2px solid #25D366;
            color: #25D366;
            padding: 12px;
            font-size: 14px;
        }
        
        .payment-btn.orange {
            border-color: #FF6600;
            color: #FF6600;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: #999;
        }
        
        .required {
            color: #dc3545;
        }
        
        .intention-preset {
            display: inline-block;
            background: #e0e0e0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .intention-preset:hover {
            background: #667eea;
            color: white;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .category-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕊️ Demande de Messe</h1>
        <div class="subtitle">Confiez votre intention de prière</div>
        
        <form id="messeForm">
            <div class="form-group">
                <label>🙏 Votre nom <span class="required">*</span></label>
                <input type="text" id="nom" required placeholder="Ex: Marie Dupont">
            </div>
            
            <div class="form-group">
                <label>📞 Téléphone <span class="required">*</span></label>
                <input type="tel" id="telephone" required placeholder="Votre numéro pour le ticket">
            </div>
            
            <div class="form-group">
                <label>📅 Date souhaitée <span class="required">*</span></label>
                <input type="date" id="date" required>
            </div>
            
            <div class="form-group">
                <label>⏰ Horaire préféré</label>
                <select id="horaire">
                    <option value="Matin (8h)">Matin (8h)</option>
                    <option value="Midi (12h)">Midi (12h)</option>
                    <option value="Soir (18h30)">Soir (18h30)</option>
                    <option value="Flexible">Flexible</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📂 Catégorie</label>
                <div class="category-buttons">
                    <button type="button" class="cat-btn" data-cat="requiem">⚰️ Requiem</button>
                    <button type="button" class="cat-btn" data-cat="action">🙏 Action de grâce</button>
                    <button type="button" class="cat-btn" data-cat="diverse">📝 Demande diverse</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>📝 Intention de la messe <span class="required">*</span></label>
                <div id="presetContainer" style="margin-bottom: 10px; flex-wrap: wrap; display: flex;"></div>
                <textarea id="intention" required placeholder="Décrivez votre intention..."></textarea>
            </div>
            
            <div class="price">
                💰 Montant total : <span id="montantTotal">2000</span> FCFA
                <input type="hidden" id="prix" value="2000">
            </div>
            
            <button type="submit" id="submitBtn">📨 Envoyer ma demande</button>
        </form>
        
        <div id="message" class="message"></div>
        <div id="ticket" class="ticket" style="display: none;"></div>
        
        <div class="payment-buttons" id="paymentSection" style="display: none;">
            <button class="payment-btn" onclick="paiementOrange()">📱 Payer par Orange Money</button>
            <button class="payment-btn orange" onclick="paiementMoov()">📱 Payer par Moov Money</button>
        </div>
        
        <div class="footer">🙏 Que Dieu vous bénisse | Chaque intention : 2000 FCFA</div>
    </div>
    
    <script>
        // Configuration du script Google Sheets
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbymZiEZbW27xTn4CFMmbcVfd2Wkibmayn0ZxAtbEbJC3gTfiBvJ1kSkYut0bQ93PqaT/exec';
        
        // Intentions préremplies par catégorie
        const intentionsPresets = {
            requiem: [
                "Pour le repos de l'âme de [NOM du défunt]",
                "Pour les défunts de ma famille",
                "Pour les âmes du purgatoire",
                "Anniversaire de décès de [NOM]"
            ],
            action: [
                "Action de grâce pour une grâce reçue",
                "Pour remercier Dieu pour ma famille",
                "Pour la guérison de [NOM]",
                "Pour la réussite de [PROJET/EXAMEN]"
            ],
            diverse: [
                "Pour la paix dans le monde",
                "Pour ma famille et mes proches",
                "Pour la conversion des pécheurs",
                "Pour les vocations sacerdotales",
                "Pour mon travail et mes collègues",
                "Pour la protection de nos enfants"
            ]
        };
        
        let ticketData = null;
        let currentCategory = "requiem";
        
        // Éléments DOM
        const nomInput = document.getElementById('nom');
        const telephoneInput = document.getElementById('telephone');
        const intentionTextarea = document.getElementById('intention');
        const presetContainer = document.getElementById('presetContainer');
        const montantSpan = document.getElementById('montantTotal');
        const ticketDiv = document.getElementById('ticket');
        const paymentSection = document.getElementById('paymentSection');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('messeForm');
        
        // Date par défaut = demain
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('date').value = tomorrow.toISOString().split('T')[0];
        
        // Gestion des catégories
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                updatePresets();
            });
        });
        
        // Activer la première catégorie par défaut
        document.querySelector('.cat-btn').classList.add('active');
        updatePresets();
        
        function updatePresets() {
            presetContainer.innerHTML = '';
            const presets = intentionsPresets[currentCategory];
            presets.forEach(preset => {
                const span = document.createElement('span');
                span.className = 'intention-preset';
                span.textContent = preset;
                span.onclick = () => {
                    if (intentionTextarea.value) {
                        intentionTextarea.value += '\n' + preset;
                    } else {
                        intentionTextarea.value = preset;
                    }
                };
                presetContainer.appendChild(span);
            });
        }
        
        // Générer un numéro de ticket unique
        function genererNumeroTicket() {
            const date = new Date();
            const timestamp = date.getFullYear().toString() + 
                             (date.getMonth()+1).toString().padStart(2,'0') + 
                             date.getDate().toString().padStart(2,'0') +
                             date.getHours().toString().padStart(2,'0') +
                             date.getMinutes().toString().padStart(2,'0') +
                             date.getSeconds().toString().padStart(2,'0');
            const random = Math.floor(Math.random() * 1000).toString().padStart(3,'0');
            return `MESSE-${timestamp}-${random}`;
        }
        
        // Afficher le ticket
        function afficherTicket(demande, numeroTicket) {
            const dateTicket = new Date().toLocaleString('fr-FR');
            ticketDiv.style.display = 'block';
            ticketDiv.innerHTML = `
                <div style="text-align: center; margin-bottom: 10px;">
                    <strong>🧾 TICKET DE DEMANDE DE MESSE</strong>
                </div>
                <div style="border-top: 1px dashed #ccc; margin: 8px 0;"></div>
                <p><strong>Numéro :</strong> ${numeroTicket}</p>
                <p><strong>Date :</strong> ${dateTicket}</p>
                <p><strong>Nom :</strong> ${demande.nom}</p>
                <p><strong>Téléphone :</strong> ${demande.telephone}</p>
                <p><strong>Date messe :</strong> ${demande.date}</p>
                <p><strong>Horaire :</strong> ${demande.horaire}</p>
                <p><strong>Catégorie :</strong> ${currentCategory}</p>
                <p><strong>Intention :</strong> ${demande.intention.substring(0, 100)}...</p>
                <div style="border-top: 1px dashed #ccc; margin: 8px 0;"></div>
                <p style="text-align: center;"><strong>Montant à payer : ${demande.prix} FCFA</strong></p>
                <div style="border-top: 1px dashed #ccc; margin: 8px 0;"></div>
                <p style="text-align: center; font-size: 11px;">Veuillez effectuer le paiement via Orange Money ou Moov Money</p>
            `;
        }
        
        // Fonctions de paiement
        function paiementOrange() {
            if (!ticketData) return;
            const phone = ticketData.telephone;
            const amount = ticketData.prix;
            const ticketNum = ticketData.numeroTicket;
            
            // Redirection vers le paiement Orange Money
            const orangePaymentUrl = `https://api.orange.com/orange_money/web_payment?phone=${phone}&amount=${amount}&reference=${ticketNum}`;
            
            // Message d'information
            messageDiv.className = 'message info';
            messageDiv.textContent = `📱 Redirection vers Orange Money pour le paiement de ${amount} FCFA...`;
            messageDiv.style.display = 'block';
            
            // Simuler une redirection (dans la vraie vie, on utiliserait l'API Orange)
            setTimeout(() => {
                messageDiv.className = 'message success';
                messageDiv.textContent = `✅ Demande de paiement Orange Money envoyée au ${phone}. Vous allez recevoir une notification sur votre téléphone.`;
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }, 1500);
            
            // Envoyer la confirmation
            envoyerConfirmationPaiement('Orange Money');
        }
        
        function paiementMoov() {
            if (!ticketData) return;
            const phone = ticketData.telephone;
            const amount = ticketData.prix;
            const ticketNum = ticketData.numeroTicket;
            
            messageDiv.className = 'message info';
            messageDiv.textContent = `📱 Redirection vers Moov Money pour le paiement de ${amount} FCFA...`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.className = 'message success';
                messageDiv.textContent = `✅ Demande de paiement Moov Money envoyée au ${phone}. Vous allez recevoir une notification sur votre téléphone.`;
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }, 1500);
            
            envoyerConfirmationPaiement('Moov Money');
        }
        
        function envoyerConfirmationPaiement(moyen) {
            const data = {
                ...ticketData,
                moyenPaiement: moyen,
                statutPaiement: 'En attente',
                dateTicket: new Date().toLocaleString('fr-FR')
            };
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).catch(e => console.log('Erreur:', e));
        }
        
        // Soumission du formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nom = nomInput.value.trim();
            const telephone = telephoneInput.value.trim();
            const date = document.getElementById('date').value;
            const horaire = document.getElementById('horaire').value;
            const intention = intentionTextarea.value.trim();
            const prix = 2000;
            
            if (!nom || !telephone || !date || !intention) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Veuillez remplir tous les champs obligatoires (nom, téléphone, date, intention).';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Envoi en cours...';
            
            const demande = {
                nom: nom,
                telephone: telephone,
                date: date,
                horaire: horaire,
                intention: intention,
                categorie: currentCategory,
                prix: prix,
                dateSoumission: new Date().toLocaleString('fr-FR')
            };
            
            const numeroTicket = genererNumeroTicket();
            ticketData = {
                ...demande,
                numeroTicket: numeroTicket
            };
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(demande)
                });
                
                messageDiv.className = 'message success';
                messageDiv.textContent = '✅ Votre demande a été enregistrée !';
                messageDiv.style.display = 'block';
                
                afficherTicket(demande, numeroTicket);
                paymentSection.style.display = 'flex';
                
                form.reset();
                document.getElementById('date').value = tomorrow.toISOString().split('T')[0];
                intentionTextarea.value = '';
                
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
                
            } catch (error) {
                console.error('Erreur:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Une erreur est survenue. Veuillez réessayer.';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📨 Envoyer ma demande';
            }
        });
    </script>
</body>
</html>
