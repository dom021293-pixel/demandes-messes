<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Demande de Messe - Paroisse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: scale(1.02);
        }
        
        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
            border-left: 4px solid #28a745;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border-left: 4px solid #dc3545;
        }
        
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
            border-left: 4px solid #17a2b8;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: #999;
        }
        
        .required {
            color: #dc3545;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            input, select, textarea {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕊️ Demande de Messe</h1>
        <div class="subtitle">Confiez votre intention de prière</div>
        
        <form id="messeForm">
            <div class="form-group">
                <label>🙏 Votre nom <span class="required">*</span></label>
                <input type="text" id="nom" required placeholder="Ex: Marie Dupont">
            </div>
            
            <div class="form-group">
                <label>📅 Date souhaitée <span class="required">*</span></label>
                <input type="date" id="date" required>
            </div>
            
            <div class="form-group">
                <label>⏰ Horaire préféré</label>
                <select id="horaire">
                    <option value="Matin (8h)">Matin (8h)</option>
                    <option value="Midi (12h)">Midi (12h)</option>
                    <option value="Soir (18h30)">Soir (18h30)</option>
                    <option value="Flexible">Flexible</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📝 Intention de la messe <span class="required">*</span></label>
                <textarea id="intention" required placeholder="Pour qui ou pour quoi souhaitez-vous prier ?"></textarea>
            </div>
            
            <div class="form-group">
                <label>📞 Téléphone (optionnel)</label>
                <input type="tel" id="telephone" placeholder="Pour vous confirmer la messe">
            </div>
            
            <button type="submit" id="submitBtn">📨 Envoyer ma demande</button>
        </form>
        
        <div id="message" class="message"></div>
        <div class="footer">🙏 Que Dieu vous bénisse</div>
    </div>
    
    <script>
        // ⚠️ REMPLACE CETTE URL PAR TON URL APPS SCRIPT (doPost)
        const SCRIPT_URL = 'https://script.google.com/macros/s/TON_URL_ICI/exec';
        
        const form = document.getElementById('messeForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        
        // Date par défaut = demain
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('date').value = tomorrow.toISOString().split('T')[0];
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                nom: document.getElementById('nom').value.trim(),
                date: document.getElementById('date').value,
                horaire: document.getElementById('horaire').value,
                intention: document.getElementById('intention').value.trim(),
                telephone: document.getElementById('telephone').value.trim(),
                dateSoumission: new Date().toLocaleString('fr-FR')
            };
            
            // Validation simple
            if (!data.nom || !data.date || !data.intention) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Veuillez remplir tous les champs obligatoires.';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
                return;
            }
            
            // Désactiver le bouton pendant l'envoi
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Envoi en cours...';
            
            messageDiv.className = 'message info';
            messageDiv.textContent = '⏳ Envoi de votre demande...';
            messageDiv.style.display = 'block';
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                messageDiv.className = 'message success';
                messageDiv.textContent = '✅ Votre demande a été envoyée ! Vous serez informé(e) dès que possible. Merci et que Dieu vous bénisse.';
                form.reset();
                
                // Remettre la date par défaut
                document.getElementById('date').value = tomorrow.toISOString().split('T')[0];
                
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 6000);
                
            } catch (error) {
                console.error('Erreur:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Une erreur est survenue. Veuillez réessayer ou contacter directement la paroisse.';
                
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📨 Envoyer ma demande';
            }
        });
    </script>
</body>
</html>
