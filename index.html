<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Demande de Messe - Paroisse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .category-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .cat-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .cat-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .intention-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }
        
        .intention-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .intention-title {
            font-weight: bold;
            color: #333;
        }
        
        .intention-price {
            color: #2a5298;
            font-weight: bold;
        }
        
        .intention-text {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin: 8px 0;
        }
        
        .remove-intention {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .add-intention-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin: 10px 0;
        }
        
        .price {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin: 15px 0;
            border: 1px solid #667eea;
        }
        
        .price-label {
            font-size: 14px;
            color: #666;
        }
        
        .price-amount {
            font-size: 28px;
            font-weight: bold;
            color: #2a5298;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: scale(1.02);
        }
        
        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
            border-left: 4px solid #28a745;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border-left: 4px solid #dc3545;
        }
        
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
            border-left: 4px solid #17a2b8;
        }
        
        .ticket {
            background: #fff9e6;
            border: 2px dashed #ffc107;
            border-radius: 16px;
            padding: 16px;
            margin: 15px 0;
            font-size: 12px;
        }
        
        .payment-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        
        .payment-btn {
            flex: 1;
            background: white;
            border: 2px solid #25D366;
            color: #25D366;
            padding: 12px;
            font-size: 14px;
            margin-top: 0;
        }
        
        .payment-btn.orange {
            border-color: #FF6600;
            color: #FF6600;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: #999;
        }
        
        .required {
            color: #dc3545;
        }
        
        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        
        .preset {
            background: #e0e0e0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .preset:hover {
            background: #667eea;
            color: white;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .payment-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕊️ Demande de Messe</h1>
        <div class="subtitle">Confiez vos intentions de prière</div>
        
        <form id="messeForm">
            <div class="form-group">
                <label>🙏 Votre nom <span class="required">*</span></label>
                <input type="text" id="nom" required placeholder="Ex: Marie Dupont">
            </div>
            
            <div class="form-group">
                <label>📞 Téléphone <span class="required">*</span></label>
                <input type="tel" id="telephone" required placeholder="Votre numéro (ex: 699999999)">
            </div>
            
            <div class="form-group">
                <label>📅 Date souhaitée <span class="required">*</span></label>
                <input type="date" id="date" required>
            </div>
            
            <div class="form-group">
                <label>⏰ Horaire préféré</label>
                <select id="horaire">
                    <option value="Matin (8h)">Matin (8h)</option>
                    <option value="Midi (12h)">Midi (12h)</option>
                    <option value="Soir (18h30)">Soir (18h30)</option>
                    <option value="Flexible">Flexible</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📂 Catégorie principale</label>
                <div class="category-buttons">
                    <button type="button" class="cat-btn" data-cat="requiem">⚰️ Requiem</button>
                    <button type="button" class="cat-btn" data-cat="action">🙏 Action de grâce</button>
                    <button type="button" class="cat-btn" data-cat="diverse">📝 Demande diverse</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>📝 Intentions (2000 FCFA chacune)</label>
                <div class="preset-buttons" id="presetContainer"></div>
                <div id="intentionsList"></div>
                <button type="button" class="add-intention-btn" onclick="ajouterIntention()">+ Ajouter une intention</button>
            </div>
            
            <div class="price">
                <div class="price-label">💰 Montant total à payer</div>
                <div class="price-amount" id="montantTotal">0</div>
                <div class="price-label">FCFA (2000 FCFA par intention)</div>
            </div>
            
            <button type="submit" id="submitBtn">📨 Envoyer ma demande</button>
        </form>
        
        <div id="message" class="message"></div>
        <div id="ticket" class="ticket" style="display: none;"></div>
        
        <div class="payment-buttons" id="paymentSection" style="display: none;">
            <button class="payment-btn" onclick="paiementOrange()">📱 Payer par Orange Money</button>
            <button class="payment-btn orange" onclick="paiementMoov()">📱 Payer par Moov Money</button>
        </div>
        
        <div class="footer">🙏 Que Dieu vous bénisse | 2000 FCFA par intention</div>
    </div>
    
    <script>
        // Configuration
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbymZiEZbW27xTn4CFMmbcVfd2Wkibmayn0ZxAtbEbJC3gTfiBvJ1kSkYut0bQ93PqaT/exec';
        const PRIX_PAR_INTENTION = 2000;
        
        // Numéro de réception de l'argent (À MODIFIER par votre numéro)
        const NUMERO_RECEPTION_ORANGE = '699999999';  // REMPLACEZ PAR VOTRE NUMÉRO
        const NUMERO_RECEPTION_MOOV = '699999999';    // REMPLACEZ PAR VOTRE NUMÉRO
        
        // Intentions préremplies
        const intentionsPresets = {
            requiem: [
                "Pour le repos de l'âme de [NOM]",
                "Pour les défunts de ma famille",
                "Pour les âmes du purgatoire",
                "Anniversaire de décès de [NOM]"
            ],
            action: [
                "Action de grâce pour une grâce reçue",
                "Pour remercier Dieu pour ma famille",
                "Pour la guérison de [NOM]",
                "Pour la réussite de [PROJET]"
            ],
            diverse: [
                "Pour la paix dans le monde",
                "Pour ma famille et mes proches",
                "Pour la conversion des pécheurs",
                "Pour les vocations sacerdotales",
                "Pour mon travail",
                "Pour la protection de nos enfants"
            ]
        };
        
        let intentions = [];
        let currentCategory = "requiem";
        let ticketData = null;
        let intentionId = 0;
        
        // Éléments DOM
        const nomInput = document.getElementById('nom');
        const telephoneInput = document.getElementById('telephone');
        const intentionsList = document.getElementById('intentionsList');
        const montantSpan = document.getElementById('montantTotal');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('messeForm');
        const ticketDiv = document.getElementById('ticket');
        const paymentSection = document.getElementById('paymentSection');
        
        // Date par défaut = demain
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('date').value = tomorrow.toISOString().split('T')[0];
        
        // Gestion des catégories
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                updatePresets();
            });
        });
        
        document.querySelector('.cat-btn').classList.add('active');
        updatePresets();
        
        function updatePresets() {
            const container = document.getElementById('presetContainer');
            container.innerHTML = '';
            const presets = intentionsPresets[currentCategory];
            presets.forEach(preset => {
                const span = document.createElement('span');
                span.className = 'preset';
                span.textContent = preset;
                span.onclick = () => ajouterIntentionAvecTexte(preset);
                container.appendChild(span);
            });
        }
        
        function ajouterIntentionAvecTexte(texte) {
            intentions.push({
                id: intentionId++,
                texte: texte
            });
            afficherIntentions();
            calculerMontant();
        }
        
        function ajouterIntention() {
            intentions.push({
                id: intentionId++,
                texte: "Nouvelle intention..."
            });
            afficherIntentions();
            calculerMontant();
        }
        
        function supprimerIntention(id) {
            intentions = intentions.filter(i => i.id !== id);
            afficherIntentions();
            calculerMontant();
        }
        
        function modifierTexte(id, nouveauTexte) {
            const intention = intentions.find(i => i.id === id);
            if (intention) {
                intention.texte = nouveauTexte;
            }
        }
        
        function afficherIntentions() {
            if (intentions.length === 0) {
                intentionsList.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">Aucune intention pour le moment. Cliquez sur "Ajouter" ou sur une intention préremplie.</div>';
                return;
            }
            
            let html = '';
            intentions.forEach(intention => {
                html += `
                    <div class="intention-item">
                        <div class="intention-header">
                            <span class="intention-title">Intention ${intention.id + 1}</span>
                            <span class="intention-price">${PRIX_PAR_INTENTION} FCFA</span>
                            <button type="button" class="remove-intention" onclick="supprimerIntention(${intention.id})">✖ Supprimer</button>
                        </div>
                        <textarea class="intention-text" onchange="modifierTexte(${intention.id}, this.value)" placeholder="Décrivez votre intention...">${intention.texte}</textarea>
                    </div>
                `;
            });
            intentionsList.innerHTML = html;
        }
        
        function calculerMontant() {
            const total = intentions.length * PRIX_PAR_INTENTION;
            montantSpan.textContent = total;
            return total;
        }
        
        function genererNumeroTicket() {
            const date = new Date();
            const timestamp = date.getFullYear().toString() + 
                             (date.getMonth()+1).toString().padStart(2,'0') + 
                             date.getDate().toString().padStart(2,'0') +
                             date.getHours().toString().padStart(2,'0') +
                             date.getMinutes().toString().padStart(2,'0') +
                             date.getSeconds().toString().padStart(2,'0');
            const random = Math.floor(Math.random() * 1000).toString().padStart(3,'0');
            return `MESSE-${timestamp}-${random}`;
        }
        
        function afficherTicket(demande, numeroTicket) {
            const dateTicket = new Date().toLocaleString('fr-FR');
            let intentionsText = '';
            demande.intentions.forEach((int, idx) => {
                intentionsText += `${idx+1}. ${int.texte.substring(0, 80)}...\n`;
            });
            
            ticketDiv.style.display = 'block';
            ticketDiv.innerHTML = `
                <div style="text-align: center; margin-bottom: 10px;">
                    <strong>🧾 TICKET DE DEMANDE DE MESSE</strong>
                </div>
                <div style="border-top: 1px dashed #ccc; margin: 8px 0;"></div>
                <p><strong>Numéro :</strong> ${numeroTicket}</p>
                <p><strong>Date :</strong> ${dateTicket}</p>
                <p><strong>Nom :</strong> ${demande.nom}</p>
                <p><strong>Téléphone :</strong> ${demande.telephone}</p>
                <p><strong>Date messe :</strong> ${demande.date}</p>
                <p><strong>Horaire :</strong> ${demande.horaire}</p>
                <p><strong>Catégorie :</strong> ${demande.categorie}</p>
                <p><strong>Nombre d'intentions :</strong> ${demande.intentions.length}</p>
                <div style="border-top: 1px dashed #ccc; margin: 8px 0;"></div>
                <p><strong>Intentions :</strong><br>${intentionsText}</p>
                <div style="border-top: 1px dashed #ccc; margin: 8px 0;"></div>
                <p style="text-align: center;"><strong>Montant à payer : ${demande.prix} FCFA</strong></p>
                <div style="border-top: 1px dashed #ccc; margin: 8px 0;"></div>
                <p style="text-align: center; font-size: 11px;">Veuillez effectuer le paiement via Orange Money ou Moov Money</p>
            `;
        }
        
        // Paiement avec ouverture USSD
        function paiementOrange() {
            if (!ticketData) return;
            const montant = ticketData.prix;
            const telephoneEnvoyeur = ticketData.telephone;
            const telephoneReceveur = NUMERO_RECEPTION_ORANGE;
            
            // Code USSD Orange Money
            // Format: *144*numero_receveur*montant#
            const codeUSSD = `*144*${telephoneReceveur}*${montant}#`;
            
            messageDiv.className = 'message info';
            messageDiv.textContent = `📱 Ouverture du code USSD Orange Money... Montant: ${montant} FCFA`;
            messageDiv.style.display = 'block';
            
            // Redirection vers le code USSD (fonctionne sur les vrais téléphones)
            window.location.href = `tel:${codeUSSD}`;
            
            setTimeout(() => {
                messageDiv.className = 'message success';
                messageDiv.textContent = `✅ Code USSD ouvert. Composez le ${codeUSSD} sur votre téléphone pour finaliser le paiement.`;
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 8000);
            }, 1000);
            
            envoyerConfirmationPaiement('Orange Money', montant);
        }
        
        function paiementMoov() {
            if (!ticketData) return;
            const montant = ticketData.prix;
            const telephoneEnvoyeur = ticketData.telephone;
            const telephoneReceveur = NUMERO_RECEPTION_MOOV;
            
            // Code USSD Moov Money
            // Format: *144*numero_receveur*montant# (vérifier selon opérateur)
            const codeUSSD = `*144*${telephoneReceveur}*${montant}#`;
            
            messageDiv.className = 'message info';
            messageDiv.textContent = `📱 Ouverture du code USSD Moov Money... Montant: ${montant} FCFA`;
            messageDiv.style.display = 'block';
            
            window.location.href = `tel:${codeUSSD}`;
            
            setTimeout(() => {
                messageDiv.className = 'message success';
                messageDiv.textContent = `✅ Code USSD ouvert. Composez le ${codeUSSD} sur votre téléphone pour finaliser le paiement.`;
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 8000);
            }, 1000);
            
            envoyerConfirmationPaiement('Moov Money', montant);
        }
        
        function envoyerConfirmationPaiement(moyen, montant) {
            const data = {
                ...ticketData,
                moyenPaiement: moyen,
                montantPaye: montant,
                statutPaiement: 'En attente',
                dateTicket: new Date().toLocaleString('fr-FR')
            };
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).catch(e => console.log('Erreur:', e));
        }
        
        // Soumission du formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nom = nomInput.value.trim();
            const telephone = telephoneInput.value.trim();
            const date = document.getElementById('date').value;
            const horaire = document.getElementById('horaire').value;
            
            if (!nom || !telephone || !date) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Veuillez remplir tous les champs obligatoires (nom, téléphone, date).';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
                return;
            }
            
            if (intentions.length === 0) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Veuillez ajouter au moins une intention.';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
                return;
            }
            
            const intentionsValides = intentions.filter(i => i.texte.trim() !== '');
            if (intentionsValides.length === 0) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Veuillez décrire vos intentions.';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
                return;
            }
            
            const prixTotal = intentions.length * PRIX_PAR_INTENTION;
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Envoi en cours...';
            
            const demande = {
                nom: nom,
                telephone: telephone,
                date: date,
                horaire: horaire,
                intentions: intentions.map(i => i.texte),
                categorie: currentCategory,
                nbIntentions: intentions.length,
                prix: prixTotal,
                dateSoumission: new Date().toLocaleString('fr-FR')
            };
            
            const numeroTicket = genererNumeroTicket();
            ticketData = {
                ...demande,
                numeroTicket: numeroTicket
            };
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(demande)
                });
                
                messageDiv.className = 'message success';
                messageDiv.textContent = '✅ Votre demande a été enregistrée !';
                messageDiv.style.display = 'block';
                
                afficherTicket(demande, numeroTicket);
                paymentSection.style.display = 'flex';
                
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
                
            } catch (error) {
                console.error('Erreur:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Une erreur est survenue. Veuillez réessayer.';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📨 Envoyer ma demande';
            }
        });
        
        // Ajouter une première intention par défaut
        ajouterIntention();
    </script>
</body>
</html>
